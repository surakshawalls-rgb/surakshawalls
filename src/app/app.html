<!-- PRIVATE VIEW: Logged In Users -->
<div class="app-container" [class.non-library-theme]="!isLibraryRoute()" *ngIf="authService.isLoggedIn">
  <mat-toolbar color="primary" class="app-toolbar">
    <!-- Mobile Menu Button -->
    <button mat-icon-button 
            *ngIf="isHandset$ | async" 
            [matMenuTriggerFor]="mobileMenu"
            class="mobile-menu-btn"
            aria-label="Open menu">
      <mat-icon>menu</mat-icon>
    </button>

    <span class="app-title">
      <mat-icon class="title-icon">shield</mat-icon>
      SURAKSHA GROUP
    </span>
    
    <!-- Main Navigation Menu -->
    <nav class="main-nav" *ngIf="!(isHandset$ | async)">
      <!-- Home Button - Always Visible -->
      <button mat-button routerLink="/home" routerLinkActive="active" class="nav-button">
        <mat-icon>home</mat-icon>
      </button>

      <ng-container *ngIf="hasManufacturingAccess() || isLabourStaff()">
        <button mat-button routerLink="/dashboard" routerLinkActive="active" class="nav-button nav-primary-action" *ngIf="hasManufacturingAccess()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>
        <button mat-button routerLink="/labour-workspace" routerLinkActive="active" class="nav-button nav-primary-action" *ngIf="isLabourStaff()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>

        <button mat-button [matMenuTriggerFor]="addMenu" class="nav-button nav-add-btn">
          <mat-icon>add</mat-icon>
          <span>Operations</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #addMenu="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/labour-workspace">
            <mat-icon>groups</mat-icon>
            <span>Labour Workspace</span>
          </button>
          <button mat-menu-item routerLink="/client-payment" *ngIf="!isLabourStaff()">
            <mat-icon>payments</mat-icon>
            <span>Revenue Collection</span>
          </button>
          <button mat-menu-item routerLink="/production-workspace">
            <mat-icon>precision_manufacturing</mat-icon>
            <span>Production Workspace</span>
          </button>
          <button mat-menu-item routerLink="/stock-workspace" *ngIf="!isLabourStaff()">
            <mat-icon>inventory_2</mat-icon>
            <span>Stock Workspace</span>
          </button>
          <button mat-menu-item routerLink="/company-cash" *ngIf="authService.isAdmin()">
            <mat-icon>account_balance_wallet</mat-icon>
            <span>Partner Withdrawals</span>
          </button>
        </mat-menu>

        <button mat-button [matMenuTriggerFor]="reportsMenuSimple" class="nav-button">
          <mat-icon>assessment</mat-icon>
          <span>Reports</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #reportsMenuSimple="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/labour-workspace" *ngIf="!isLabourStaff()">
            <mat-icon>menu_book</mat-icon>
            <span>Labour Ledger</span>
          </button>
          <button mat-menu-item routerLink="/partner-dashboard" *ngIf="authService.isAdmin()">
            <mat-icon>book</mat-icon>
            <span>Partner Ledger</span>
          </button>
          <button mat-menu-item routerLink="/reports-dashboard" *ngIf="!isLabourStaff()">
            <mat-icon>bar_chart</mat-icon>
            <span>Revenue and Dues</span>
          </button>
          <button mat-menu-item routerLink="/production-workspace" *ngIf="!isLabourStaff()">
            <mat-icon>factory</mat-icon>
            <span>Production Overview</span>
          </button>
          <button mat-menu-item routerLink="/stock-workspace" *ngIf="!isLabourStaff()">
            <mat-icon>account_balance</mat-icon>
            <span>Stock and Balance</span>
          </button>
        </mat-menu>
      </ng-container>

      <ng-container *ngIf="hasLibraryAccess()">
        <button mat-button [matMenuTriggerFor]="libraryQuickMenu" class="nav-button">
          <mat-icon>menu_book</mat-icon>
          <span>Library</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #libraryQuickMenu="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/library-grid">
            <mat-icon>grid_on</mat-icon>
            <span>Seating Grid</span>
          </button>
          <button mat-menu-item routerLink="/library-dashboard" *ngIf="hasFullLibraryAccess()">
            <mat-icon>dashboard</mat-icon>
            <span>Dashboard</span>
          </button>
          <button mat-menu-item routerLink="/library-students" *ngIf="hasFullLibraryAccess()">
            <mat-icon>school</mat-icon>
            <span>Students</span>
          </button>
          <button mat-menu-item routerLink="/library-expenses" *ngIf="hasFullLibraryAccess()">
            <mat-icon>payments</mat-icon>
            <span>Expenses</span>
          </button>
        </mat-menu>
      </ng-container>
    </nav>

    <span class="toolbar-spacer"></span>
    
    <!-- Notification Bell (Admin Only) -->
    <app-notification-inbox *ngIf="authService.isAdmin()"></app-notification-inbox>
    
    <span class="user-badge">
      <mat-icon>account_circle</mat-icon>
      {{ currentUser?.full_name || currentUser?.email }}
    </span>
    
    <mat-menu #mobileMenu="matMenu" class="mobile-nav-menu">
      <button mat-menu-item routerLink="/home">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </button>

      <ng-container *ngIf="hasManufacturingAccess() || isLabourStaff()">
        <button mat-menu-item routerLink="/dashboard" *ngIf="hasManufacturingAccess()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>
        <button mat-menu-item routerLink="/labour-workspace" *ngIf="isLabourStaff()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>

        <mat-divider></mat-divider>
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>add_circle</mat-icon>
          <span>Operations</span>
        </button>
        <button mat-menu-item routerLink="/labour-workspace">
          <mat-icon>groups</mat-icon>
          <span>Labour Workspace</span>
        </button>
        <button mat-menu-item routerLink="/client-payment" *ngIf="!isLabourStaff()">
          <mat-icon>payments</mat-icon>
          <span>Revenue Collection</span>
        </button>
        <button mat-menu-item routerLink="/production-workspace">
          <mat-icon>precision_manufacturing</mat-icon>
          <span>Production Workspace</span>
        </button>
        <button mat-menu-item routerLink="/stock-workspace" *ngIf="!isLabourStaff()">
          <mat-icon>inventory_2</mat-icon>
          <span>Stock Workspace</span>
        </button>
        <button mat-menu-item routerLink="/company-cash" *ngIf="authService.isAdmin()">
          <mat-icon>account_balance_wallet</mat-icon>
          <span>Partner Withdrawals</span>
        </button>

        <mat-divider></mat-divider>
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>assessment</mat-icon>
          <span>Reports</span>
        </button>
        <button mat-menu-item routerLink="/labour-workspace" *ngIf="!isLabourStaff()">
          <mat-icon>menu_book</mat-icon>
          <span>Labour Ledger</span>
        </button>
        <button mat-menu-item routerLink="/partner-dashboard" *ngIf="authService.isAdmin()">
          <mat-icon>book</mat-icon>
          <span>Partner Ledger</span>
        </button>
        <button mat-menu-item routerLink="/reports-dashboard" *ngIf="!isLabourStaff()">
          <mat-icon>bar_chart</mat-icon>
          <span>Revenue and Dues</span>
        </button>
        <button mat-menu-item routerLink="/production-workspace" *ngIf="!isLabourStaff()">
          <mat-icon>factory</mat-icon>
          <span>Production Overview</span>
        </button>
        <button mat-menu-item routerLink="/stock-workspace" *ngIf="!isLabourStaff()">
          <mat-icon>account_balance</mat-icon>
          <span>Stock and Balance</span>
        </button>
      </ng-container>

      <ng-container *ngIf="hasLibraryAccess()">
        <mat-divider></mat-divider>
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>local_library</mat-icon>
          <span>Library</span>
        </button>
        <button mat-menu-item routerLink="/library-grid">
          <mat-icon>grid_on</mat-icon>
          <span>Seating Grid</span>
        </button>
        <button mat-menu-item routerLink="/library-dashboard" *ngIf="hasFullLibraryAccess()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>
        <button mat-menu-item routerLink="/library-students" *ngIf="hasFullLibraryAccess()">
          <mat-icon>school</mat-icon>
          <span>Students</span>
        </button>
        <button mat-menu-item routerLink="/library-expenses" *ngIf="hasFullLibraryAccess()">
          <mat-icon>payments</mat-icon>
          <span>Expenses</span>
        </button>
      </ng-container>
    </mat-menu>
  </mat-toolbar>

  <div class="main-content" [class.non-library-theme]="!isLibraryRoute()">
    <div class="content-wrapper" [class.non-library-theme]="!isLibraryRoute()">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- PUBLIC VIEW: NOT LOGGED IN -->
<div class="public-container" *ngIf="!authService.isLoggedIn">
  <router-outlet></router-outlet>
</div>
