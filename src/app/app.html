<!-- PRIVATE VIEW: Logged In Users -->
<div class="app-container" *ngIf="authService.isLoggedIn">
  <mat-toolbar color="primary" class="app-toolbar">
    <!-- Mobile Menu Button -->
    <button mat-icon-button 
            *ngIf="isHandset$ | async" 
            [matMenuTriggerFor]="mobileMenu"
            class="mobile-menu-btn"
            aria-label="Open menu">
      <mat-icon>menu</mat-icon>
    </button>

    <span class="app-title">
      <mat-icon class="title-icon">shield</mat-icon>
      SURAKSHA GROUP
    </span>
    
    <!-- Main Navigation Menu -->
    <nav class="main-nav" *ngIf="!(isHandset$ | async)">
      <!-- Home Button - Always Visible -->
      <button mat-button routerLink="/home" routerLinkActive="active" class="nav-button">
        <mat-icon>home</mat-icon>
      </button>

      <!-- Labour Staff: ONLY Daily Entry -->
      <ng-container *ngIf="isLabourStaff()">
        <button mat-button routerLink="/daily-entry" routerLinkActive="active" class="nav-button">
          <span>Daily Entry</span>
        </button>
      </ng-container>

      <!-- Manufacturing Section (Excludes Labour Staff) -->
      <ng-container *ngIf="hasManufacturingAccess()">
        <!-- ⭐ OPERATIONS -->
        <button mat-button [matMenuTriggerFor]="operationsMenu" class="nav-button">
          <span>Operations</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #operationsMenu="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/daily-entry" routerLinkActive="active">
            <mat-icon>edit_note</mat-icon>
            <span>Daily Entry</span>
          </button>
          <button mat-menu-item routerLink="/pending-approvals" routerLinkActive="active" *ngIf="authService.isAdmin()">
            <mat-icon>pending_actions</mat-icon>
            <span>Pending Approvals</span>
          </button>
        </mat-menu>

        <!-- INVENTORY & STOCK -->
        <button mat-button [matMenuTriggerFor]="inventoryMenu" class="nav-button">
          <span>Inventory</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #inventoryMenu="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/inventory" routerLinkActive="active">
            <mat-icon>inventory_2</mat-icon>
            <span>Current Stock</span>
          </button>
          <button mat-menu-item routerLink="/stock-audit" routerLinkActive="active">
            <mat-icon>fact_check</mat-icon>
            <span>Stock Audit</span>
          </button>
          <button mat-menu-item routerLink="/material-purchase" routerLinkActive="active">
            <mat-icon>shopping_cart</mat-icon>
            <span>Material Purchase</span>
          </button>
          <button mat-menu-item routerLink="/supplier-management" routerLinkActive="active">
            <mat-icon>local_shipping</mat-icon>
            <span>Supplier Management</span>
          </button>
        </mat-menu>

        <!-- FINANCE -->
        <button mat-button [matMenuTriggerFor]="financeMenu" class="nav-button">
          <span>Finance</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #financeMenu="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/client-ledger" routerLinkActive="active">
            <mat-icon>people</mat-icon>
            <span>Client Ledger</span>
          </button>
          <button mat-menu-item routerLink="/client-payment" routerLinkActive="active">
            <mat-icon>payments</mat-icon>
            <span>Client Payments</span>
          </button>
          <button mat-menu-item routerLink="/labour-ledger" routerLinkActive="active">
            <mat-icon>account_balance_wallet</mat-icon>
            <span>Labour Ledger</span>
          </button>
        </mat-menu>

        <!-- REPORTS & ANALYTICS -->
        <button mat-button [matMenuTriggerFor]="reportsMenu" class="nav-button">
          <span>Reports</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #reportsMenu="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/dashboard" routerLinkActive="active">
            <mat-icon>dashboard</mat-icon>
            <span>Dashboard</span>
          </button>
          <button mat-menu-item routerLink="/reports-dashboard" routerLinkActive="active">
            <mat-icon>assessment</mat-icon>
            <span>Business Reports</span>
          </button>
        </mat-menu>
      </ng-container>

      <!-- Partner & Admin Section -->
      <ng-container *ngIf="authService.isAdmin()">
        <button mat-button [matMenuTriggerFor]="partnerMenu" class="nav-button">
          <span>Admin</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #partnerMenu="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/partner-dashboard" routerLinkActive="active">
            <mat-icon>dashboard</mat-icon>
            <span>Partner Dashboard</span>
          </button>
          <button mat-menu-item routerLink="/partner" routerLinkActive="active">
            <mat-icon>handshake</mat-icon>
            <span>Partner Settings</span>
          </button>
          <button mat-menu-item routerLink="/company-cash" routerLinkActive="active">
            <mat-icon>account_balance</mat-icon>
            <span>Company Cash</span>
          </button>
          <button mat-menu-item routerLink="/admin-user-management" routerLinkActive="active">
            <mat-icon>manage_accounts</mat-icon>
            <span>User Management</span>
          </button>
        </mat-menu>
      </ng-container>

      <!-- Library Section -->
      <ng-container *ngIf="hasLibraryAccess()">
        <button mat-button [matMenuTriggerFor]="libraryMenu" class="nav-button">
          <span>Library</span>
          <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #libraryMenu="matMenu" class="nav-dropdown">
          <button mat-menu-item routerLink="/library-grid" routerLinkActive="active">
            <mat-icon>grid_on</mat-icon>
            <span>Seat Grid</span>
          </button>
          <ng-container *ngIf="hasFullLibraryAccess()">
            <button mat-menu-item routerLink="/library-dashboard" routerLinkActive="active">
              <mat-icon>dashboard</mat-icon>
              <span>Library Dashboard</span>
            </button>
            <button mat-menu-item routerLink="/library-students" routerLinkActive="active">
              <mat-icon>school</mat-icon>
              <span>Students</span>
            </button>
            <button mat-menu-item routerLink="/library-registration-requests" routerLinkActive="active" *ngIf="authService.canEdit()">
              <mat-icon>how_to_reg</mat-icon>
              <span>Membership Requests</span>
            </button>
            <button mat-menu-item routerLink="/library-expenses" routerLinkActive="active">
              <mat-icon>payments</mat-icon>
              <span>Expenses</span>
            </button>
          </ng-container>
          <ng-container *ngIf="authService.isAdmin()">
            <button mat-menu-item routerLink="/library-complaints" routerLinkActive="active">
              <mat-icon>feedback</mat-icon>
              <span>View Complaints</span>
            </button>
          </ng-container>
        </mat-menu>
      </ng-container>
    </nav>

    <span class="toolbar-spacer"></span>
    
    <!-- Notification Bell (Admin Only) -->
    <app-notification-inbox *ngIf="authService.isAdmin()"></app-notification-inbox>
    
    <span class="user-badge">
      <mat-icon>account_circle</mat-icon>
      {{ currentUser?.full_name || currentUser?.email }}
    </span>
    
    <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu">
      <mat-icon>more_vert</mat-icon>
    </button>
    
    <mat-menu #userMenu="matMenu" xPosition="before">
      <button mat-menu-item disabled>
        <mat-icon>person</mat-icon>
        <span>{{ currentUser?.full_name || currentUser?.email }}</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="sendTestNotification()" *ngIf="authService.isAdmin() && isLocalhostEnvironment">
        <mat-icon>notifications_active</mat-icon>
        <span>Test Notifications</span>
      </button>
      <mat-divider *ngIf="authService.isAdmin() && isLocalhostEnvironment"></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>

    <!-- Mobile Full Menu -->
    <mat-menu #mobileMenu="matMenu" class="mobile-nav-menu">
      <!-- Home Button -->
      <button mat-menu-item routerLink="/home">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </button>
      <mat-divider></mat-divider>
      
      <!-- Labour Staff: ONLY Daily Entry -->
      <ng-container *ngIf="isLabourStaff()">
        <button mat-menu-item routerLink="/daily-entry">
          <mat-icon>edit_note</mat-icon>
          <span>Daily Entry</span>
        </button>
      </ng-container>

      <!-- Manufacturing Section (Excludes Labour Staff) -->
      <ng-container *ngIf="hasManufacturingAccess()">
        <!-- OPERATIONS -->
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>settings</mat-icon>
          <span>OPERATIONS</span>
        </button>
        <button mat-menu-item routerLink="/daily-entry">
          <mat-icon>edit_note</mat-icon>
          <span>Daily Entry</span>
        </button>
        <button mat-menu-item routerLink="/pending-approvals" *ngIf="authService.isAdmin()">
          <mat-icon>pending_actions</mat-icon>
          <span>Pending Approvals</span>
        </button>
        <mat-divider></mat-divider>
        
        <!-- INVENTORY -->
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>inventory_2</mat-icon>
          <span>INVENTORY</span>
        </button>
        <button mat-menu-item routerLink="/inventory">
          <mat-icon>inventory_2</mat-icon>
          <span>Current Stock</span>
        </button>
        <button mat-menu-item routerLink="/stock-audit">
          <mat-icon>fact_check</mat-icon>
          <span>Stock Audit</span>
        </button>
        <button mat-menu-item routerLink="/material-purchase">
          <mat-icon>shopping_cart</mat-icon>
          <span>Material Purchase</span>
        </button>
        <button mat-menu-item routerLink="/supplier-management">
          <mat-icon>local_shipping</mat-icon>
          <span>Supplier Management</span>
        </button>
        <mat-divider></mat-divider>
        
        <!-- FINANCE -->
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>account_balance</mat-icon>
          <span>FINANCE</span>
        </button>
        <button mat-menu-item routerLink="/client-ledger">
          <mat-icon>people</mat-icon>
          <span>Client Ledger</span>
        </button>
        <button mat-menu-item routerLink="/client-payment">
          <mat-icon>payments</mat-icon>
          <span>Client Payments</span>
        </button>
        <button mat-menu-item routerLink="/labour-ledger">
          <mat-icon>account_balance_wallet</mat-icon>
          <span>Labour Ledger</span>
        </button>
        <mat-divider></mat-divider>
        
        <!-- REPORTS -->
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>assessment</mat-icon>
          <span>REPORTS</span>
        </button>
        <button mat-menu-item routerLink="/dashboard">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>
        <button mat-menu-item routerLink="/reports-dashboard">
          <mat-icon>assessment</mat-icon>
          <span>Business Reports</span>
        </button>
      </ng-container>
      
      <ng-container *ngIf="authService.isAdmin()">
        <mat-divider></mat-divider>
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>admin_panel_settings</mat-icon>
          <span>ADMIN</span>
        </button>
        <button mat-menu-item routerLink="/partner-dashboard">
          <mat-icon>dashboard</mat-icon>
          <span>Partner Dashboard</span>
        </button>
        <button mat-menu-item routerLink="/partner">
          <mat-icon>handshake</mat-icon>
          <span>Partner Settings</span>
        </button>
        <button mat-menu-item routerLink="/company-cash">
          <mat-icon>account_balance</mat-icon>
          <span>Company Cash</span>
        </button>
        <button mat-menu-item routerLink="/admin-user-management">
          <mat-icon>manage_accounts</mat-icon>
          <span>User Management</span>
        </button>
      </ng-container>
      <ng-container *ngIf="hasLibraryAccess()">
        <mat-divider></mat-divider>
        <button mat-menu-item disabled class="menu-section-header">
          <mat-icon>local_library</mat-icon>
          <span>LIBRARY</span>
        </button>
        <button mat-menu-item routerLink="/library-grid">
          <mat-icon>grid_on</mat-icon>
          <span>Seat Grid</span>
        </button>
        <ng-container *ngIf="hasFullLibraryAccess()">
          <button mat-menu-item routerLink="/library-dashboard">
            <mat-icon>dashboard</mat-icon>
            <span>Library Dashboard</span>
          </button>
          <button mat-menu-item routerLink="/library-students">
            <mat-icon>school</mat-icon>
            <span>Students</span>
          </button>
          <button mat-menu-item routerLink="/library-registration-requests" *ngIf="authService.canEdit()">
            <mat-icon>how_to_reg</mat-icon>
            <span>Membership Requests</span>
          </button>
          <button mat-menu-item routerLink="/library-expenses">
            <mat-icon>payments</mat-icon>
            <span>Expenses</span>
          </button>
        </ng-container>
        <ng-container *ngIf="authService.isAdmin()">
          <button mat-menu-item routerLink="/library-complaints">
            <mat-icon>feedback</mat-icon>
            <span>View Complaints</span>
          </button>
        </ng-container>
      </ng-container>
    </mat-menu>
  </mat-toolbar>

  <div class="main-content">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- PUBLIC VIEW: NOT LOGGED IN -->
<div class="public-container" *ngIf="!authService.isLoggedIn">
  <router-outlet></router-outlet>
</div>
