<app-domain-workspace-shell
  title="Production Workspace"
  subtitle="Run daily production operations from one tabbed page"
  icon="precision_manufacturing">

  <mat-tab-group animationDuration="200ms" dynamicHeight>
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon>factory</mat-icon>
        Production Console
      </ng-template>
      <ng-template matTabContent>
        <app-production></app-production>
      </ng-template>
    </mat-tab>
  </mat-tab-group>
</app-domain-workspace-shell>
